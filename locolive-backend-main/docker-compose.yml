version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locolive-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DB_DRIVER=postgres
      - DB_SOURCE=postgresql://postgres:password@postgres:5432/privacy_social?sslmode=disable
      - SERVER_ADDRESS=0.0.0.0:8080
      - REDIS_ADDRESS=redis://redis:6379
      - JWT_SECRET=super-secret-key-change-in-production
    volumes:
      - ./uploads:/app/uploads
    networks:
      - locolive-net
    restart: on-failure

  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: locolive-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=privacy_social
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d privacy_social"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locolive-net

  redis:
    image: redis:7-alpine
    container_name: locolive-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locolive-net

networks:
  locolive-net:
    driver: bridge

volumes:
  postgres_data:
